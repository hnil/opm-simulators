name: 'Install OPM Dependencies'
description: 'Installs all dependencies required to build OPM simulators'
inputs:
  opm-version:
    description: 'Branch or tag for OPM dependency repositories (opm-common, opm-grid)'
    required: false
    default: 'master'
runs:
  using: 'composite'
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential cmake ninja-build git ca-certificates \
          libboost-all-dev \
          libdune-common-dev libdune-geometry-dev libdune-grid-dev \
          libdune-istl-dev \
          libblas-dev liblapack-dev libsuitesparse-dev \
          libopenmpi-dev openmpi-bin \
          libtrilinos-zoltan-dev \
          pkg-config zlib1g-dev

    - name: Build and install opm-common
      shell: bash
      run: |
        git clone --depth 1 --branch ${{ inputs.opm-version }} \
          https://github.com/OPM/opm-common.git /tmp/opm-common
        cmake -S /tmp/opm-common -B /tmp/opm-common/build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_TESTING=OFF \
          -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build /tmp/opm-common/build -j $(nproc)
        sudo cmake --install /tmp/opm-common/build
        rm -rf /tmp/opm-common

    - name: Build and install opm-grid
      shell: bash
      run: |
        git clone --depth 1 --branch ${{ inputs.opm-version }} \
          https://github.com/OPM/opm-grid.git /tmp/opm-grid
        cmake -S /tmp/opm-grid -B /tmp/opm-grid/build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_TESTING=OFF \
          -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build /tmp/opm-grid/build -j $(nproc)
        sudo cmake --install /tmp/opm-grid/build
        rm -rf /tmp/opm-grid

name: Run OPM Flow Tests

on:
  workflow_dispatch:
    inputs:
      test_category:
        description: 'Test category to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - regression
          - parallel
          - restart
      parallel_jobs:
        description: 'Number of parallel CTest jobs'
        required: false
        default: '4'
      opm_version:
        description: 'OPM version (branch or tag for dependencies)'
        required: false
        default: 'master'
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 02:00 UTC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/testing

permissions:
  contents: read
  packages: read
  checks: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull test image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Run tests with timing
        run: |
          CATEGORY="${{ inputs.test_category || 'all' }}"
          JOBS="${{ inputs.parallel_jobs || '4' }}"

          CTEST_ARGS="--parallel ${JOBS} --output-on-failure --output-junit /tmp/test-results.xml --test-output-size-passed 65536 --test-output-size-failed 65536"

          if [ "${CATEGORY}" != "all" ]; then
            CTEST_ARGS="${CTEST_ARGS} -L ${CATEGORY}"
          fi

          echo "Running tests: category=${CATEGORY}, parallel_jobs=${JOBS}"
          echo "CTest args: ${CTEST_ARGS}"
          echo ""

          # Run tests and capture timing
          START_TIME=$(date +%s)
          docker run --rm \
            -v "${{ github.workspace }}/results:/tmp" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            bash -c "ctest ${CTEST_ARGS} 2>&1" || TEST_FAILED=1
          END_TIME=$(date +%s)
          ELAPSED=$((END_TIME - START_TIME))

          echo ""
          echo "========================================"
          echo "Total wall-clock time: ${ELAPSED}s ($((ELAPSED/60))m $((ELAPSED%60))s)"
          echo "========================================"

          if [ "${TEST_FAILED}" = "1" ]; then
            echo "Some tests failed."
            exit 1
          fi

      - name: Generate summary
        if: always()
        run: |
          RESULTS="${{ github.workspace }}/results/test-results.xml"
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${RESULTS}" ]; then
            TOTAL=$(grep -o 'tests="[0-9]*"' "${RESULTS}" | head -1 | grep -o '[0-9]*' || echo "0")
            FAILURES=$(grep -o 'failures="[0-9]*"' "${RESULTS}" | head -1 | grep -o '[0-9]*' || echo "0")
            DISABLED=$(grep -o 'disabled="[0-9]*"' "${RESULTS}" | head -1 | grep -o '[0-9]*' || echo "0")
            TOTAL=${TOTAL:-0}
            FAILURES=${FAILURES:-0}
            DISABLED=${DISABLED:-0}
            PASSED=$((TOTAL - FAILURES - DISABLED))
            echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| ✅ Passed | ${PASSED} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| ❌ Failed | ${FAILURES} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| ⏭ Disabled | ${DISABLED} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Total** | **${TOTAL}** |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ "${FAILURES}" -gt 0 ] 2>/dev/null; then
              echo "### Failed Tests" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              grep 'name=.*status="fail"' "${RESULTS}" \
                | sed 's/.*name="\([^"]*\)".*/\1/' >> "$GITHUB_STEP_SUMMARY" || true
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "⚠️ No test results file found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish test summary
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ${{ github.workspace }}/results/test-results.xml
          check_name: "CTest Results"
          comment_mode: off

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ github.workspace }}/results/test-results.xml
          retention-days: 30

      - name: List all available tests
        if: always()
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ctest --show-only --format json | head -200
